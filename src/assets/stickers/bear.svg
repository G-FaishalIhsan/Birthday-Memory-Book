<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Outer Ear Left -->
  <circle cx="28" cy="28" r="14" fill="#D2B48C" />
  <circle cx="28" cy="28" r="8" fill="#FFC0CB" />
  
  <!-- Outer Ear Right -->
  <circle cx="72" cy="72" r="14" fill="#D2B48C" transform="translate(0, -44)" />
  <circle cx="72" cy="28" r="8" fill="#FFC0CB" />

  <!-- Head -->
  <circle cx="50" cy="53" r="32" fill="#E8C39E" />
  
  <!-- Muzzle -->
  <ellipse cx="50" cy="62" rx="14" ry="10" fill="#FFF8ED" />
  
  <!-- Nose -->
  <polygon points="46,58 54,58 50,63" fill="#6B4E3D" />
  
  <!-- Mouth -->
  <path d="M 48 64 Q 50 67 52 64" fill="none" stroke="#6B4E3D" stroke-width="2" stroke-linecap="round" />
  
  <!-- Eyes -->
  <circle cx="38" cy="48" r="4.5" fill="#3D291F" />
  <circle cx="62" cy="48" r="4.5" fill="#3D291F" />
  
  <!-- Eye Sparkles -->
  <circle cx="36.5" cy="46.5" r="1.5" fill="#FFFFFF" />
  <circle cx="60.5" cy="46.5" r="1.5" fill="#FFFFFF" />

  <!-- Blush -->
  <ellipse cx="30" cy="56" rx="6" ry="4" fill="#FFA07A" opacity="0.6" />
  <ellipse cx="70" cy="56" rx="6" ry="4" fill="#FFA07A" opacity="0.6" />
</svg>
