<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Small sprinkles of confetti shapes -->
  <!-- Pink rectangle -->
  <rect x="20" y="30" width="8" height="15" rx="2" fill="#FFD6E3" transform="rotate(30 20 30)" />
  <!-- Lavender circle -->
  <circle cx="50" cy="20" r="5" fill="#DCC7FF" />
  <!-- Peach triangle -->
  <polygon points="75,25 85,35 65,40" fill="#FFD1A8" />
  <!-- Yellow star shape -->
  <path d="M 30 70 Q 30 78 38 78 Q 30 78 30 86 Q 30 78 22 78 Q 30 78 30 70 Z" fill="#FFE385" />
  <!-- Blue circle -->
  <circle cx="70" cy="75" r="4" fill="#B3E5FC" />
  <!-- Pink oval -->
  <ellipse cx="50" cy="55" rx="3" ry="8" fill="#F27FA6" transform="rotate(-45 50 55)" />
</svg>
