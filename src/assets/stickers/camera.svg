<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Flash button -->
  <rect x="25" y="20" width="15" height="10" rx="3" fill="#DCC7FF" />
  <rect x="65" y="16" width="12" height="14" rx="2" fill="#FFC107" />
  <!-- Camera body -->
  <rect x="15" y="30" width="70" height="50" rx="10" fill="#B3E5FC" stroke="#81D4FA" stroke-width="2" />
  <!-- Center stripe -->
  <rect x="15" y="45" width="70" height="12" fill="#FFD6E3" />
  <!-- Lens outer -->
  <circle cx="50" cy="55" r="20" fill="#FFF8ED" stroke="#81D4FA" stroke-width="2" />
  <!-- Lens inner -->
  <circle cx="50" cy="55" r="14" fill="#37474F" />
  <circle cx="45" cy="50" r="4" fill="#FFFFFF" opacity="0.8" />
  <!-- Viewfinder -->
  <rect x="22" y="36" width="10" height="6" rx="1" fill="#ECEFF1" />
</svg>
