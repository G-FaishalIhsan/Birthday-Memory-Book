<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Polaroid paper -->
  <rect x="30" y="20" width="140" height="160" rx="4" fill="#FFFFFF" filter="drop-shadow(0px 4px 8px rgba(0,0,0,0.05))" />
  <!-- Polaroid image area -->
  <rect x="42" y="32" width="116" height="110" fill="#FFF8ED" />
  <!-- Coffee cup -->
  <circle cx="90" cy="95" r="22" fill="#FFD1A8" />
  <ellipse cx="90" cy="95" rx="16" ry="12" fill="#6B4E3D" />
  <!-- Mug handle -->
  <path d="M 112 95 C 122 95, 122 83, 112 83" fill="none" stroke="#FFD1A8" stroke-width="4" />
  <!-- Cookie -->
  <circle cx="125" cy="110" r="12" fill="#D2B48C" />
  <circle cx="121" cy="106" r="1.5" fill="#6B4E3D" />
  <circle cx="129" cy="114" r="1.5" fill="#6B4E3D" />
  <circle cx="128" cy="106" r="1.5" fill="#6B4E3D" />
</svg>
